<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#161A26"/>
      <stop offset="100%" stop-color="#0A0C12"/>
    </linearGradient>
    <linearGradient id="gold" x1="13" y1="10" x2="51" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E8B84B"/>
      <stop offset="55%"  stop-color="#C9952A"/>
      <stop offset="100%" stop-color="#A67318"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Outer gold rim -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="12" stroke="url(#gold)" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Hexagon fill (soft glow) -->
  <path d="M32 11 L50 21.5 V42.5 L32 53 L14 42.5 V21.5 Z"
        fill="#C9952A" fill-opacity="0.06"/>

  <!-- Hexagon border -->
  <path d="M32 11 L50 21.5 V42.5 L32 53 L14 42.5 V21.5 Z"
        stroke="url(#gold)" stroke-width="1.8" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Woven cross lines (textile motif) -->
  <line x1="32" y1="11" x2="32" y2="53"   stroke="#C9952A" stroke-width="0.85" stroke-opacity="0.5"/>
  <line x1="14" y1="21.5" x2="50" y2="42.5" stroke="#C9952A" stroke-width="0.85" stroke-opacity="0.5"/>
  <line x1="50" y1="21.5" x2="14" y2="42.5" stroke="#C9952A" stroke-width="0.85" stroke-opacity="0.5"/>

  <!-- Center gem -->
  <circle cx="32" cy="32" r="4.5" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="2.2" fill="#0F1117"/>

  <!-- Vertex accent dots -->
  <circle cx="32" cy="11"   r="1.6" fill="url(#gold)" opacity="0.85"/>
  <circle cx="50" cy="21.5" r="1.6" fill="url(#gold)" opacity="0.85"/>
  <circle cx="50" cy="42.5" r="1.6" fill="url(#gold)" opacity="0.85"/>
  <circle cx="32" cy="53"   r="1.6" fill="url(#gold)" opacity="0.85"/>
  <circle cx="14" cy="42.5" r="1.6" fill="url(#gold)" opacity="0.85"/>
  <circle cx="14" cy="21.5" r="1.6" fill="url(#gold)" opacity="0.85"/>
</svg>
